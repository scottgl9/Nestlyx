services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nestlyx
      POSTGRES_PASSWORD: nestlyx
      POSTGRES_DB: nestlyx
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nestlyx']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://nestlyx:nestlyx@postgres:5432/nestlyx
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      API_PORT: 3001
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: /app/uploads
      ICE_SERVERS: '[{"urls":"stun:stun.l.google.com:19302"}]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads_data:
